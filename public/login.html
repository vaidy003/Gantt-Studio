<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gantt Studio Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #050505;
        --panel: #111315;
        --panel-soft: #181b1f;
        --line: rgba(232, 237, 242, 0.16);
        --text: #f2f4f7;
        --muted: #a8b0b8;
        --accent: #16b89a;
        --danger: #ff7b8d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top, rgba(22, 184, 154, 0.1), transparent 34%), var(--bg);
        color: var(--text);
        font-family: "Manrope", sans-serif;
      }

      .login-card {
        width: min(460px, 100%);
        padding: 28px;
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
        border: 1px solid var(--line);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.26);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
      }

      .brand img {
        width: 96px;
        height: auto;
        display: block;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.8rem, 5vw, 2.6rem);
        font-weight: 500;
        line-height: 0.94;
        letter-spacing: -0.03em;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #8db9db;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.72rem;
        font-weight: 800;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.6;
      }

      label {
        display: grid;
        gap: 10px;
      }

      span {
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 58px;
        padding: 0 18px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: inherit;
      }

      input:focus {
        outline: 2px solid rgba(22, 184, 154, 0.45);
        outline-offset: 1px;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 20px;
      }

      button {
        min-height: 58px;
        padding: 0 22px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .error {
        min-height: 22px;
        margin-top: 14px;
        color: var(--danger);
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <div class="brand">
        <img src="./sdi-logo.png" alt="SDI logo" />
        <h1>Timeline</h1>
      </div>
      <p class="eyebrow">Shared Access</p>
      <p>Enter the team password to open the SDI timeline.</p>
      <form id="loginForm">
        <label>
          <span>Password</span>
          <input id="passwordInput" type="password" name="password" autocomplete="current-password" required />
        </label>
        <div id="errorMessage" class="error" role="alert" aria-live="polite"></div>
        <div class="actions">
          <button type="submit">Continue</button>
        </div>
      </form>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const passwordInput = document.getElementById("passwordInput");
      const errorMessage = document.getElementById("errorMessage");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorMessage.textContent = "";

        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: passwordInput.value }),
        });
        const payload = await response.json();

        if (!response.ok) {
          errorMessage.textContent = payload.error || "Could not sign in.";
          passwordInput.focus();
          passwordInput.select();
          return;
        }

        window.location.replace("/");
      });
    </script>
  </body>
</html>
